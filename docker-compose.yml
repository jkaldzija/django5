services:
  backend:
    build: .
    env_file:
      - .env
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery_worker:
    build: .
    env_file:
      - .env
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    environment:
      RUN_MIGRATIONS: "0"
    command: celery -A core worker -l info -Q default
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker_long:
    build: .
    env_file:
      - .env
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    environment:
      RUN_MIGRATIONS: "0"
    command: celery -A core worker -l info -Q long_tasks --concurrency=1 --prefetch-multiplier=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build: .
    env_file:
      - .env
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    environment:
      RUN_MIGRATIONS: "0"
    command: celery -A core beat -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
